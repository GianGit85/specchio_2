<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorpresa ✨</title>
    <style>
        body { margin: 0; background: black; color: white; font-family: sans-serif; 
               display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        video { width: 90%; border-radius: 20px; transform: scaleX(-1); border: 3px solid #fff; }
        h1 { margin-top: 20px; font-size: 1.8rem; text-align: center; }
    </style>
</head>
<body>
    <video id="webcam" autoplay playsinline></video>
    <h1>Sei proprio tu! 💖</h1>

    <script>
        const video = document.getElementById('webcam');
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => { video.srcObject = stream; })
            .catch(err => { alert("Per favore, ricarica la pagina e consenti l'accesso alla fotocamera!"); });
    </script>
</body>
</html>
